<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>HEADLINER — a comedy metroidvania</title>
  <meta name="description" content="A homeless open-micer hunts the lost relics of comedy to dethrone The Booker. 2D metroidvania, playable in your browser." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #07070d;
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #0a0a12;
      box-shadow: 0 0 60px rgba(255, 215, 0, 0.07);
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script type="module" src="src/main.js"></script>
</body>
</html>
